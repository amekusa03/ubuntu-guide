<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {
        font-family: sans-serif; /* 読みやすいフォントに設定 */
        padding: 20px;
        text-align: center; /* コンテンツを中央揃え */
        max-width: 960px; /* 画面幅が広い場合の最大幅 */
        margin: 0 auto; /* 左右中央に配置 */
        background-color: #fdfcf0; /* パステルクリームの背景色 */
        color: #5d4037; /* 文字色を柔らかいブラウンに */
    }
    h1 {
        font-size: 2.2em; /* フォントサイズを調整 */
        color: #5d4037; /* 文字色をブラウンに */
        border-bottom: 3px solid #ffb74d; /* パステルオレンジの下線 */
        display: inline-block; /* 下線の幅をテキストに合わせる */
        padding-bottom: 5px; /* テキストと下線の間の余白 */
        margin-bottom: 15px; /* 見出しと下の説明文の間の余白 */
    }
    p {
        color: #8d6e63; /* 説明文も少し明るめのブラウンに */
        margin-bottom: 30px; /* 動画との余白を調整 */
    }
    table {
        width: 100%;
        max-width: 600px; /* テーブルの最大幅を制限 */
        border-collapse: collapse; /* 枠線を一本化 */
        margin: 0 auto; /* 中央揃え（余白はラッパーで設定） */
    }
    th, td {
        border: 1px solid #ccc; /* 薄いグレーの枠線 */
        padding: 12px; /* 内側の余白を広げて見やすく */
        text-align: center;
    }
    th {
        background-color: #e1f5fe; /* テーブル見出しをパステルブルーに */
    }
    /* レスポンシブ対応用のラッパー */
    .table-wrapper {
        max-width: 600px;
        margin: 20px auto; /* 上下の余白と左右の中央揃え */
        overflow-x: auto; /* 画面幅が狭い時に横スクロールを表示 */
        -webkit-overflow-scrolling: touch; /* スマホでのスクロールを滑らかに */
    }
    /* スマートフォン向けの調整 */
    @media (max-width: 600px) {
        th, td {
            padding: 8px 4px; /* 余白を詰める */
            font-size: 0.9em; /* 文字サイズを少し小さく */
        }
        .btn-download {
            padding: 6px 10px; /* ボタンのサイズ調整 */
            font-size: 0.85em;
        }
    }
    .video-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; /* 16:9のアスペクト比を維持 (9 / 16 = 0.5625) */
        height: 0;
        overflow: hidden;
        max-width: 800px; /* 動画が大きくなりすぎないように最大幅を設定（任意） */
        margin: 0 auto 20px auto; /* 中央揃えと下の余白 */
    }
    .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    .btn-download {
        display: inline-block;
        padding: 8px 16px;
        background-color: #4fc3f7; /* ボタンの背景色（パステルブルー） */
        color: white;
        text-decoration: none; /* 下線を消す */
        border-radius: 4px; /* 角を少し丸くする */
        transition: background-color 0.3s;
    }
    .btn-download:hover {
        background-color: #29b6f6; /* ホバー時に少し濃くする */
    }
    .btn-download i {
        margin-right: 8px; /* アイコンとテキストの間隔 */
    }
</style>
